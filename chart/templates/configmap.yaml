apiVersion: v1
kind: ConfigMap
metadata:
  name: airsim-condo-settings
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simstack.labels" . | nindent 4 }}
    component: airsim-condo
data:
  settings.json: |
{{ required "airsim.settingsJson is required — pass via: --set-file airsim.settingsJson=<path/to/settings.json>" .Values.airsim.settingsJson | indent 4 }}
